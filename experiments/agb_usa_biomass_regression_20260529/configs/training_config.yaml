model: lightgbm_emb64
seed: 42
cv:
  strategy: leave-one-project-out
  partition_key: project_name
  n_folds: 23

hyperparameters:        # hardcoded in tf-deep-landcover/src/agb/train_agb_lgbm.py
  num_leaves: 31
  learning_rate: 0.05
  n_estimators: 2000
  early_stopping_rounds: 50

features:
  source_parquet: "/home/mattc/code/tf-deep-landcover/experiments/agb/usa_v1_pilot_joint_v2/features.parquet"
  columns: "emb_00..emb_63"
  count: 64
  pca_n_components: null     # not used (raw 64-dim embeddings)

invocation:
  repo: tf-deep-landcover
  repo_sha: e8c70584
  command: >
    cd /home/mattc/code/tf-deep-landcover &&
    uv run python -m src.agb.train_agb_lgbm
    --features /home/mattc/code/tf-deep-landcover/experiments/agb/usa_v1_pilot_joint_v2/features.parquet
    --out-dir /home/mattc/code/crop-ml-agent-evolve/experiments/agb_usa_biomass_regression_20260529/checkpoints
    --fig-dir /home/mattc/code/crop-ml-agent-evolve/experiments/agb_usa_biomass_regression_20260529/evaluation/figures

outputs:
  out_dir: "experiments/agb_usa_biomass_regression_20260529/checkpoints"
  model: "checkpoints/model.txt  (copied to checkpoints/best.ckpt)"
  metrics: "checkpoints/metrics.json"
  metrics_history: "checkpoints/metrics_history.csv (per-fold, synthesised from metrics.json)"
  figures: "evaluation/figures/{residuals_by_quintile,shap_beeswarm,shap_grouped,emb_correlation}.png"
