decision_rule:
  rule_source: "configs/experiment_design.md §7 (threshold-free)"
  encoding_gate: PASS
  h1_directional_dominance: SUPPORTED
  h2_saturation_resistance: NOT_SUPPORTED  # gap does not widen with DB band
  h3_covariate_rank_tracking: MOSTLY_SUPPORTED  # age & Hdom strong; YC null
  ood: SEVERE_DOMAIN_SHIFT
  outcome: RETRAIN_WARRANTED
  rationale: >-
    Gate passes and H1 holds, but the experiment_design credible-transfer rule requires ALL of
    H1+H2+H3 with non-catastrophic OOD. H2 fails (signed gap does NOT widen across DB quintiles;
    it is flat-to-declining, Q5 lowest) and OOD is catastrophic (domain-classifier AUC ~1.0,
    100% of Locations beyond the 99th-pct training Mahalanobis radius). This matches counter-
    hypothesis C2 (severe domain shift) partially offset by genuine structural tracking (H3 age/Hdom).
    Per design rule (b): gate-OK but H2 clearly fails -> escalate the conditional analog-subset
    (maritime+conifer) retrain to the Improvement Planner. NOT halt (gate passed); NOT fully credible.
